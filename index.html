<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Artiste - Multi Grid Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-gold: #d4af37;
            --soft-cream: #f4e4d4;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--soft-cream);
            -webkit-tap-highlight-color: transparent;
        }

        h1, .font-serif { font-family: 'Cormorant Garamond', serif; }

        .gradient-text {
            background: linear-gradient(to right, #f4e4d4, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Responsive Multi-Column Grid */
        .mosaic-grid {
            display: grid;
            /* Di HP: 2 kolom (minmax 140px agar muat 2 kotak berdampingan) */
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 160px;
            grid-auto-flow: dense;
            gap: 12px;
        }

        /* Di Tablet ke atas: 3 atau 4 kolom */
        @media (min-width: 768px) {
            .mosaic-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                grid-auto-rows: 220px;
                gap: 20px;
            }
        }

        /* Variasi Ukuran Kotak */
        .item-tall { grid-row: span 2; }
        .item-wide { grid-column: span 2; }
        .item-big { grid-column: span 2; grid-row: span 2; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            height: 100%;
            width: 100%;
            border-radius: 12px;
        }

        .glass-card:active {
            transform: scale(0.95);
        }

        .photo-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 12px;
            /* Overlay selalu terlihat sedikit di mobile agar estetik */
            opacity: 0.9; 
        }

        /* Di Desktop, overlay hanya muncul saat hover */
        @media (min-width: 1024px) {
            .photo-overlay { opacity: 0; transition: opacity 0.3s ease; }
            .glass-card:hover .photo-overlay { opacity: 1; }
            .glass-card:hover { border-color: var(--accent-gold); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="px-4 py-8 md:p-12">

    <!-- Header -->
    <header class="max-w-5xl mx-auto mb-10 text-center">
        <h1 class="text-5xl md:text-7xl font-medium gradient-text italic mb-2">L'Artiste</h1>
        <p class="text-stone-500 tracking-[0.3em] text-[8px] md:text-[10px] uppercase mb-8">Multi-Column Archive</p>
        
        <button onclick="openModal()" class="bg-stone-100 text-black px-8 py-3 rounded-full text-[10px] font-bold tracking-widest hover:bg-amber-500 transition-all active:scale-95">
            UNGGAH MEMORI
        </button>
    </header>

    <!-- Categories / Tags -->
    <nav id="filter-box" class="max-w-5xl mx-auto mb-8 flex gap-2 overflow-x-auto no-scrollbar pb-2 justify-start md:justify-center"></nav>

    <!-- The Grid -->
    <main class="max-w-5xl mx-auto">
        <div id="gallery" class="mosaic-grid">
            <!-- Photos will appear here -->
        </div>
        
        <div id="empty-state" class="hidden text-center py-20 text-stone-600 italic text-sm">
            Sentuh 'Unggah' untuk mengisi galeri...
        </div>
    </main>

    <!-- Modal Upload -->
    <div id="upload-modal" class="fixed inset-0 z-50 hidden flex items-end md:items-center justify-center bg-black/90 p-4 backdrop-blur-md">
        <div class="w-full max-w-md bg-[#111] p-6 rounded-t-3xl md:rounded-2xl border border-stone-800">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-serif italic">Simpan Karya Baru</h2>
                <button onclick="closeModal()" class="text-stone-500 text-2xl">&times;</button>
            </div>
            
            <form id="form-upload" class="space-y-5">
                <div class="border border-dashed border-stone-800 rounded-xl p-4 text-center">
                    <input type="file" id="file-input" accept="image/*" class="hidden" required>
                    <label for="file-input" id="drop-label" class="cursor-pointer text-[10px] tracking-widest text-stone-500 uppercase">
                        [ PILIH FOTO DARI GALERI ]
                    </label>
                </div>

                <input type="text" id="tag-input" placeholder="NAMA PENANDA (CONTOH: AIB, MOMENT)" required class="w-full bg-transparent border-b border-stone-800 py-3 text-[10px] tracking-[0.2em] focus:outline-none focus:border-amber-500 uppercase">
                
                <div class="space-y-2">
                    <p class="text-[8px] text-stone-600 tracking-widest uppercase">Pilih Ukuran Kotak:</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" onclick="setSize('normal')" id="btn-normal" class="size-btn text-[9px] py-3 border border-amber-500 text-amber-500 rounded-lg font-bold">KOTAK</button>
                        <button type="button" onclick="setSize('wide')" id="btn-wide" class="size-btn text-[9px] py-3 border border-stone-800 rounded-lg text-stone-500">LEBAR</button>
                        <button type="button" onclick="setSize('tall')" id="btn-tall" class="size-btn text-[9px] py-3 border border-stone-800 rounded-lg text-stone-500">TINGGI</button>
                    </div>
                </div>

                <button type="submit" class="w-full py-4 bg-amber-500 text-black text-[10px] font-bold tracking-[0.2em] rounded-xl">SIMPAN SEKARANG</button>
            </form>
        </div>
    </div>

    <script>
        let photoStore = JSON.parse(localStorage.getItem('artist_multi_grid_v1')) || [];
        let selectedSize = 'normal';
        let activeTag = 'ALL';

        function setSize(size) {
            selectedSize = size;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.replace('border-amber-500', 'border-stone-800');
                btn.classList.replace('text-amber-500', 'text-stone-500');
            });
            const activeBtn = document.getElementById('btn-' + size);
            activeBtn.classList.replace('border-stone-800', 'border-amber-500');
            activeBtn.classList.replace('text-stone-500', 'text-amber-500');
        }

        function openModal() { document.getElementById('upload-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('upload-modal').classList.add('hidden'); }

        document.getElementById('file-input').onchange = function() {
            if(this.files[0]) document.getElementById('drop-label').innerText = "FOTO TERPILIH: " + this.files[0].name.substring(0, 15) + "...";
        };

        document.getElementById('form-upload').onsubmit = function(e) {
            e.preventDefault();
            const tag = document.getElementById('tag-input').value.toUpperCase().trim();
            const file = document.getElementById('file-input').files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    photoStore.unshift({ id: Date.now(), image: e.target.result, tag: tag, size: selectedSize });
                    localStorage.setItem('artist_multi_grid_v1', JSON.stringify(photoStore));
                    closeModal();
                    render();
                };
                reader.readAsDataURL(file);
            }
        };

        function deleteItem(id) {
            if(confirm('Hapus foto ini?')) {
                photoStore = photoStore.filter(p => p.id !== id);
                localStorage.setItem('artist_multi_grid_v1', JSON.stringify(photoStore));
                render();
            }
        }

        function render() {
            // Filters
            const tags = ['ALL', ...new Set(photoStore.map(p => p.tag))];
            document.getElementById('filter-box').innerHTML = tags.map(t => `
                <button onclick="activeTag='${t}';render()" class="whitespace-nowrap px-5 py-1.5 rounded-full text-[9px] tracking-widest border ${activeTag===t?'bg-amber-500 text-black border-amber-500':'border-stone-800 text-stone-500'}">${t}</button>
            `).join('');

            // Gallery
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const filtered = activeTag === 'ALL' ? photoStore : photoStore.filter(p => p.tag === activeTag);

            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                filtered.forEach(p => {
                    const card = document.createElement('div');
                    let sizeClass = p.size === 'wide' ? 'item-wide' : (p.size === 'tall' ? 'item-tall' : '');
                    card.className = `glass-card ${sizeClass} animate-in fade-in zoom-in duration-500`;
                    card.innerHTML = `
                        <img src="${p.image}" class="w-full h-full object-cover">
                        <div class="photo-overlay">
                            <div class="flex justify-between items-center w-full">
                                <span class="text-[8px] font-bold tracking-[0.2em] text-amber-500 truncate mr-2">${p.tag}</span>
                                <button onclick="deleteItem(${p.id})" class="text-white opacity-40 hover:opacity-100 font-bold px-2">×</button>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            }
        }

        window.onload = render;
    </script>
</body>
</html>

```

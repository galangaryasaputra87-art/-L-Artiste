<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Artiste - Galeri Foto Estetik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --accent-gold: #d4af37;
            --soft-cream: #f4e4d4;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--soft-cream);
            overflow-x: hidden;
        }

        h1, h2, .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }

        .gradient-text {
            background: linear-gradient(to right, #f4e4d4, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .photo-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .photo-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0d0d0d;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        .tag-pill {
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .active-tag {
            background-color: var(--accent-gold);
            color: black;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="selection:bg-amber-200 selection:text-black">

    <!-- Hero Decor -->
    <div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-amber-900/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-amber-900/10 blur-[120px] rounded-full pointer-events-none"></div>

    <!-- Navigation Area -->
    <header class="relative z-10 max-w-7xl mx-auto px-8 pt-20 pb-12 text-center">
        <h1 class="text-6xl md:text-8xl font-medium tracking-tight mb-4 gradient-text italic">L'Artiste</h1>
        <p class="text-stone-400 font-light tracking-[0.3em] uppercase text-xs mb-10">Kurasi Memori & Visual Estetik</p>
        
        <div class="flex flex-wrap justify-center items-center gap-6">
            <button onclick="openModal()" class="group relative px-8 py-3 overflow-hidden rounded-full border border-stone-700 bg-transparent text-sm tracking-widest transition-all">
                <span class="relative z-10 group-hover:text-black transition-colors duration-300">TAMBAHKAN KARYA</span>
                <div class="absolute inset-0 bg-white translate-y-[100%] group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
        </div>
    </header>

    <!-- Filters -->
    <section class="max-w-7xl mx-auto px-8 mb-16 relative z-10">
        <div id="filter-box" class="flex flex-wrap justify-center gap-3 overflow-x-auto pb-4 no-scrollbar">
            <!-- Filter buttons injected here -->
        </div>
    </section>

    <!-- Gallery Masonry -->
    <main class="max-w-7xl mx-auto px-8 pb-32 relative z-10">
        <div id="gallery" class="columns-1 md:columns-2 lg:columns-3 gap-8">
            <!-- Photos injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-40">
            <div class="animate-float inline-block">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round" class="text-stone-600"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            </div>
            <p class="mt-6 text-stone-500 font-light italic">Galeri ini masih menunggumu...</p>
        </div>
    </main>

    <!-- Modal Upload -->
    <div id="upload-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="w-full max-w-xl glass-card rounded-lg p-10 relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-stone-500 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <h2 class="text-3xl font-serif mb-8 text-center italic">Arsip Baru</h2>
            
            <form id="form-upload" class="space-y-8">
                <div class="relative group">
                    <input type="file" id="file-input" accept="image/*" class="hidden" required>
                    <label for="file-input" class="flex flex-col items-center justify-center border border-dashed border-stone-700 py-12 cursor-pointer rounded-lg hover:border-amber-500 transition-colors group">
                        <div id="preview-box" class="hidden mb-4">
                            <img id="img-preview" src="#" class="h-32 object-contain rounded border border-stone-800">
                        </div>
                        <span id="label-text" class="text-stone-500 text-xs tracking-widest uppercase">Pilih Gambar</span>
                    </label>
                </div>

                <div class="relative">
                    <input type="text" id="tag-input" placeholder="LABEL (MISAL: ARCHITECTURE, NATURE)" required class="w-full bg-transparent border-b border-stone-800 py-3 text-sm focus:outline-none focus:border-amber-500 tracking-widest placeholder:text-stone-700 uppercase">
                </div>

                <button type="submit" class="w-full py-4 bg-stone-100 text-black text-xs font-bold tracking-[0.2em] uppercase hover:bg-amber-500 transition-colors">
                    SIMPAN KE GALERI
                </button>
            </form>
        </div>
    </div>

    <script>
        let photoStore = JSON.parse(localStorage.getItem('artist_vault_v1')) || [];
        let activeTag = 'ALL';

        const galleryEl = document.getElementById('gallery');
        const emptyEl = document.getElementById('empty-state');
        const filterEl = document.getElementById('filter-box');
        const modalEl = document.getElementById('upload-modal');
        const fileInput = document.getElementById('file-input');
        const imgPreview = document.getElementById('img-preview');
        const previewBox = document.getElementById('preview-box');

        // Modal Functions
        function openModal() { modalEl.classList.remove('hidden'); }
        function closeModal() { 
            modalEl.classList.add('hidden'); 
            document.getElementById('form-upload').reset();
            previewBox.classList.add('hidden');
        }

        // Preview Logic
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    imgPreview.src = e.target.result;
                    previewBox.classList.remove('hidden');
                    document.getElementById('label-text').innerText = "GANTI GAMBAR";
                }
                reader.readAsDataURL(file);
            }
        });

        // Save Logic
        document.getElementById('form-upload').addEventListener('submit', function(e) {
            e.preventDefault();
            const tag = document.getElementById('tag-input').value.toUpperCase().trim();
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const entry = {
                        id: Date.now(),
                        image: e.target.result,
                        tag: tag,
                        timestamp: new Date().toLocaleDateString('id-ID')
                    };
                    photoStore.unshift(entry);
                    localStorage.setItem('artist_vault_v1', JSON.stringify(photoStore));
                    closeModal();
                    renderAll();
                };
                reader.readAsDataURL(file);
            }
        });

        function deleteEntry(id) {
            photoStore = photoStore.filter(p => p.id !== id);
            localStorage.setItem('artist_vault_v1', JSON.stringify(photoStore));
            renderAll();
        }

        function renderFilters() {
            const tags = ['ALL', ...new Set(photoStore.map(p => p.tag))];
            filterEl.innerHTML = tags.map(tag => `
                <button onclick="setFilter('${tag}')" 
                    class="tag-pill px-6 py-1.5 rounded-full text-[10px] uppercase font-semibold tracking-widest border border-stone-800 
                    ${activeTag === tag ? 'active-tag' : 'hover:border-stone-500 text-stone-500'}">
                    ${tag}
                </button>
            `).join('');
        }

        function setFilter(tag) {
            activeTag = tag;
            renderAll();
        }

        function renderGallery() {
            galleryEl.innerHTML = '';
            const filtered = activeTag === 'ALL' 
                ? photoStore 
                : photoStore.filter(p => p.tag === activeTag);

            if (filtered.length === 0) {
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                filtered.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'photo-item glass-card group animate-in fade-in slide-in-from-bottom-10 duration-700';
                    card.innerHTML = `
                        <img src="${p.image}" class="w-full grayscale group-hover:grayscale-0 transition-all duration-1000 ease-out">
                        <div class="photo-overlay absolute inset-0 flex flex-col justify-end p-6">
                            <div class="flex justify-between items-end">
                                <div class="transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                                    <p class="text-[9px] tracking-widest text-amber-500 font-bold mb-1">${p.timestamp}</p>
                                    <h3 class="text-sm tracking-[0.2em] uppercase font-light">${p.tag}</h3>
                                </div>
                                <button onclick="deleteEntry(${p.id})" class="text-stone-500 hover:text-red-400 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </div>
                    `;
                    galleryEl.appendChild(card);
                });
            }
        }

        function renderAll() {
            renderFilters();
            renderGallery();
        }

        window.onload = renderAll;
    </script>
</body>
</html>

```
